<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOFIT MEAL BD</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f5f7fa;
    margin: 0;
    padding: 0;
}

header {
    background: #0f172a;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

.menu-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    align-items: center;
}

.menu-item input {
    width: 60px;
    padding: 5px;
}

input, select, button, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    background: #22c55e;
    color: white;
    border: none;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.total {
    font-size: 20px;
    font-weight: bold;
    text-align: right;
}

.summary {
    background: #ecfdf5;
    padding: 15px;
    border-radius: 10px;
}

</style>
</head>

<body>

<header>
<h1>GOFIT MEAL BD</h1>
<p>Healthy Cloud Kitchen | Galleria, Foys Lake Gate, Chittagong</p>
<p>📞 01830365120</p>
</header>

<div class="container">

<div class="card">
<h2>Menu</h2>

<div id="menu"></div>

<p class="total">Total: BDT <span id="total">0</span></p>
</div>

<div class="card">
<h2>Customer Details</h2>

<input type="text" id="name" placeholder="Your Name" required>
<input type="text" id="phone" placeholder="Phone Number" required>
<textarea id="address" placeholder="Delivery Address" required></textarea>

<label>Delivery Date</label>
<input type="date" id="date">

<label>Delivery Time</label>
<select id="time">
<option value="">Select Time</option>
<option>1:30 PM</option>
<option>2:00 PM</option>
<option>3:00 PM</option>
<option>4:00 PM</option>
<option>5:00 PM</option>
<option>6:00 PM</option>
<option>7:00 PM</option>
<option>8:00 PM</option>
<option>9:00 PM</option>
</select>

</div>

<div class="card summary">
<h2>Order Summary</h2>
<div id="summary"></div>
</div>

<button onclick="submitOrder()">Place Order via WhatsApp</button>

</div>

<script>

const menuItems = [
{name:"Hummus with Grilled Chicken & Veggies", price:500},
{name:"High-Protein Chicken Rice Bowl", price:500},
{name:"Mediterranean Ground Beef Stir Fry", price:550},
{name:"Ginger-Soy Beef with Steamed Veggies", price:550},
{name:"Thai Chicken Lettuce Wraps", price:550},
{name:"Lean Chicken Caesar Bowl", price:550},
{name:"Loaded Tuna on Toast", price:550},
{name:"Lean Poached Fish", price:550},
{name:"Thai Prawn Bowl", price:600},
{name:"Grilled Chicken Salad with Tzatziki Sauce", price:600}
];

const menuDiv = document.getElementById("menu");

menuItems.forEach((item, index) => {
    menuDiv.innerHTML += `
    <div class="menu-item">
        <span>${item.name} (BDT ${item.price})</span>
        <input type="number" min="0" value="0" id="qty${index}" onchange="updateTotal()">
    </div>
    `;
});

function updateTotal() {
    let total = 0;
    let summaryText = "";

    menuItems.forEach((item, index) => {
        let qty = document.getElementById(`qty${index}`).value;
        if(qty > 0){
            total += qty * item.price;
            summaryText += `${item.name} x${qty} = BDT ${qty * item.price}<br>`;
        }
    });

    document.getElementById("total").innerText = total;
    document.getElementById("summary").innerHTML = summaryText;
}

function submitOrder(){

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;
    let date = document.getElementById("date").value;
    let time = document.getElementById("time").value;
    let total = document.getElementById("total").innerText;
    let summary = document.getElementById("summary").innerText;

    if(!name || !phone || !address || !date || !time){
        alert("Please fill all required fields");
        return;
    }

    let msg = `*GOFIT MEAL BD ORDER*%0A
Name: ${name}%0A
Phone: ${phone}%0A
Address: ${address}%0A
Date: ${date}%0A
Time: ${time}%0A
--------------------%0A
${summary}%0A
Total: BDT ${total}`;

    let url = `https://wa.me/8801830365120?text=${msg}`;

    window.open(url, '_blank');
}

// Auto set minimum date = tomorrow
let today = new Date();
today.setDate(today.getDate() + 1);
document.getElementById("date").min = today.toISOString().split("T")[0];

</script>

</body>
</html>
