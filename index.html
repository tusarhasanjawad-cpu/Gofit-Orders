<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOFIT MEAL BD</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:'Oswald',sans-serif;background:linear-gradient(90deg,#000,#666);color:#000}
.container{max-width:900px;margin:auto;padding:20px}
.logo{text-align:center;color:#fff;font-size:40px;margin-bottom:20px}
.input{background:#ddd;border-radius:40px;padding:15px;margin-bottom:10px;text-align:center}
.section-title{color:#fff;text-align:center;margin:20px 0;font-size:28px}
.panel{background:rgba(255,255,255,0.2);padding:15px;border-radius:20px;margin-bottom:15px}
.row{display:flex;gap:10px;margin-bottom:10px}
.row div{flex:1}
select,input{width:100%;padding:12px;border-radius:30px;border:none;text-align:center}
.btn{background:#5cc046;color:#000;padding:15px;border:none;border-radius:30px;width:100%;font-size:18px;cursor:pointer;margin-top:10px}
.summary{background:#5cc046;padding:20px;border-radius:25px;min-height:150px;white-space:pre-line}
.total{color:#fff;text-align:center;font-size:22px;margin-top:10px}
.note{color:#fff;text-align:center;font-size:14px;margin-top:5px}
</style>
</head>
<body>
<div class="container">

<div class="logo">GOFIT Meal</div>

<div class="input"><input id="name" placeholder="NAME"></div>
<div class="input"><input id="phone" placeholder="PHONE NO"></div>
<div class="input"><input id="address" placeholder="ADDRESS"></div>

<div class="section-title">ORDER SELECTION PANEL</div>

<div id="panels"></div>

<button class="btn" onclick="addPanel()">ADD MORE MEAL</button>

<div class="section-title">ORDER SUMMARY</div>
<div class="summary" id="summary">No items selected</div>
<div class="total">Total: BDT <span id="total">0</span></div>
<div class="note">* Delivery Charge will be Added</div>

<button class="btn" onclick="submitOrder()">Submit On WhatsApp</button>

</div>

<script>
const menu=[
{name:"Hummus with Grilled Chicken & Veggies",price:500},
{name:"High-Protein Chicken Rice Bowl",price:500},
{name:"Mediterranean Ground Beef Stir Fry",price:550},
{name:"Ginger-Soy Beef with Steamed Veggies",price:550},
{name:"Thai Chicken Lettuce Wraps",price:550},
{name:"Lean Chicken Caesar Bowl",price:550},
{name:"Loaded Tuna on Toast",price:550},
{name:"Lean Poached Fish",price:550},
{name:"Thai Prawn Bowl",price:600},
{name:"Grilled Chicken Salad with Tzatziki Sauce",price:600}
];

function addPanel(){
let container=document.getElementById('panels');
let index=document.querySelectorAll('.panel').length;

let div=document.createElement('div');
div.className='panel';

div.innerHTML=`
<div class="row">
<div>
<select id="meal${index}" onchange="updateSummary()">
<option value="">SELECT YOUR MEAL</option>
${menu.map((m,i)=>`<option value="${i}">${m.name} (BDT ${m.price})</option>`).join('')}
</select>
</div>
<div>
<input type="number" id="qty${index}" placeholder="QNT" min="1" onchange="updateSummary()">
</div>
</div>

<div class="row">
<div><input type="date" id="date${index}" onchange="updateSummary()"></div>
<div>
<select id="time${index}" onchange="updateSummary()">
<option value="">TIME</option>
<option>1:30 PM</option>
<option>3:00 PM</option>
<option>5:00 PM</option>
<option>7:00 PM</option>
<option>9:00 PM</option>
</select>
</div>
</div>
`;

container.appendChild(div);
}

function updateSummary(){
let panels=document.querySelectorAll('.panel');
let text="";
let total=0;

panels.forEach((p,i)=>{
let mealIndex=document.getElementById(`meal${i}`).value;
let qty=parseInt(document.getElementById(`qty${i}`).value)||0;
let date=document.getElementById(`date${i}`).value;
let time=document.getElementById(`time${i}`).value;

if(mealIndex!=="" && qty>0){
let item=menu[mealIndex];
let price=item.price*qty;

total+=price;

text+=`• ${item.name} x${qty}\n${date} ${time}\nBDT ${price}\n\n`;
}
});

if(text==="") text="No items selected";

document.getElementById('summary').innerText=text;
document.getElementById('total').innerText=total;
}

function submitOrder(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;
let summary=document.getElementById('summary').innerText;
let total=document.getElementById('total').innerText;

if(!name||!phone||!address||summary==='No items selected'){
alert('Fill all fields');
return;
}

let msg=`GOFIT MEAL BD ORDER\n\nName: ${name}\nPhone: ${phone}\nAddress: ${address}\n\n${summary}\nTotal: BDT ${total}\n* Delivery Charge will be Added`;

let url=`https://wa.me/8801830365120?text=${encodeURIComponent(msg)}`;
window.open(url,'_blank');
}

// initial panel
addPanel();
</script>

</body>
</html>
