<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOFIT MEAL BD</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f7fa;color:#333}
header{background:#111;color:#fff;padding:20px;text-align:center}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.05)}
.flex{display:flex;justify-content:space-between;align-items:center}
button{background:#111;color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
input,select{padding:8px;width:100%;margin-top:5px;margin-bottom:10px;border-radius:6px;border:1px solid #ccc}
.summary{background:#fff;padding:15px;border-radius:12px}
.total{font-size:20px;font-weight:600}
</style>
</head>
<body>
<header>
<h1>GOFIT MEAL BD</h1>
<p>Healthy Cloud Kitchen | Chittagong</p>
</header>
<div class="container">

<h2>Customer Info</h2>
<div class="card">
<input id="name" placeholder="Full Name" required>
<input id="phone" placeholder="Phone Number" required>
<input id="address" placeholder="Delivery Address" required>
</div>

<h2>Menu</h2>
<div id="menu"></div>

<h2>Order Summary</h2>
<div class="summary" id="summary"></div>
<p class="total">Total: BDT <span id="total">0</span></p>

<button onclick="submitOrder()">Place Order via WhatsApp</button>

</div>

<script>
const menuItems=[
{name:"Hummus with Grilled Chicken & Veggies",price:500},
{name:"High-Protein Chicken Rice Bowl",price:500},
{name:"Mediterranean Ground Beef Stir Fry",price:550},
{name:"Ginger-Soy Beef with Steamed Veggies",price:550},
{name:"Thai Chicken Lettuce Wraps",price:550},
{name:"Lean Chicken Caesar Bowl",price:550},
{name:"Loaded Tuna on Toast",price:550},
{name:"Lean Poached Fish",price:550},
{name:"Thai Prawn Bowl",price:600},
{name:"Grilled Chicken Salad with Tzatziki Sauce",price:600}
];

const menuDiv=document.getElementById('menu');

menuItems.forEach((item,index)=>{
const div=document.createElement('div');
div.className='card';
div.innerHTML=`
<div class="flex">
<strong>${item.name}</strong>
<span>BDT ${item.price}</span>
</div>
<label>Quantity</label>
<input type="number" min="0" value="0" id="qty${index}" onchange="updateSummary()">
<label>Delivery Date</label>
<input type="date" id="date${index}" onchange="updateSummary()">
<label>Delivery Time</label>
<select id="time${index}" onchange="updateSummary()">
<option value="">Select Time</option>
<option>1:30 PM</option>
<option>3:00 PM</option>
<option>5:00 PM</option>
<option>7:00 PM</option>
<option>9:00 PM</option>
</select>
`;
menuDiv.appendChild(div);
});

function updateSummary(){
let summary="";
let total=0;
menuItems.forEach((item,i)=>{
let qty=document.getElementById(`qty${i}`).value;
let date=document.getElementById(`date${i}`).value;
let time=document.getElementById(`time${i}`).value;

if(qty>0){
let price=item.price*qty;
total+=price;
summary+=`${item.name} x${qty} | ${date} ${time} | BDT ${price}<br>`;
}
});

document.getElementById('summary').innerHTML=summary;
document.getElementById('total').innerText=total;
}

function submitOrder(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;
let summary=document.getElementById('summary').innerText;
let total=document.getElementById('total').innerText;

if(!name||!phone||!address||!summary){
alert('Please fill all required fields');
return;
}

let msg=`Order from GOFIT MEAL BD%0AName: ${name}%0APhone: ${phone}%0AAddress: ${address}%0A%0AItems:%0A${summary}%0A%0ATotal: BDT ${total}`;

window.open(`https://wa.me/8801830365120?text=${msg}`,'_blank');
}
</script>

</body>
</html>
