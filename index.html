<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOFIT MEAL BD</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;background:#f5f7fa}
header{background:#0f172a;color:#fff;padding:20px;text-align:center}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#fff;border-radius:14px;padding:15px;margin-bottom:15px;box-shadow:0 6px 15px rgba(0,0,0,0.06)}
.flex{display:flex;justify-content:space-between;align-items:center}
button{background:#22c55e;color:#fff;border:none;padding:12px;width:100%;border-radius:10px;font-size:16px;cursor:pointer}
input,select{padding:10px;width:100%;margin-top:6px;margin-bottom:10px;border-radius:8px;border:1px solid #ddd}
.summary{background:#fff;padding:15px;border-radius:12px}
.total{font-size:22px;font-weight:600;margin-top:10px}
.badge{background:#22c55e;color:#fff;padding:4px 8px;border-radius:6px;font-size:12px}
</style>
</head>
<body>
<header>
<h1>GOFIT MEAL BD</h1>
<p>Healthy Cloud Kitchen | Chittagong</p>
</header>
<div class="container">

<h2>Customer Info</h2>
<div class="card">
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Delivery Address">
</div>

<h2>Menu</h2>
<div id="menu"></div>

<h2>Order Summary</h2>
<div class="summary" id="summary">No items selected</div>
<p class="total">Total: BDT <span id="total">0</span></p>

<button onclick="submitOrder()">Order via WhatsApp</button>

</div>

<script>
const menuItems=[
{name:"Hummus with Grilled Chicken & Veggies",price:500},
{name:"High-Protein Chicken Rice Bowl",price:500},
{name:"Mediterranean Ground Beef Stir Fry",price:550},
{name:"Ginger-Soy Beef with Steamed Veggies",price:550},
{name:"Thai Chicken Lettuce Wraps",price:550},
{name:"Lean Chicken Caesar Bowl",price:550},
{name:"Loaded Tuna on Toast",price:550},
{name:"Lean Poached Fish",price:550},
{name:"Thai Prawn Bowl",price:600},
{name:"Grilled Chicken Salad with Tzatziki Sauce",price:600}
];

const menuDiv=document.getElementById('menu');

menuItems.forEach((item,index)=>{
const div=document.createElement('div');
div.className='card';
div.innerHTML=`
<div class="flex">
<strong>${item.name}</strong>
<span class="badge">BDT ${item.price}</span>
</div>
<label>Quantity</label>
<input type="number" min="0" value="0" id="qty${index}" onchange="updateSummary()">
<label>Delivery Date</label>
<input type="date" id="date${index}" onchange="updateSummary()">
<label>Delivery Time</label>
<select id="time${index}" onchange="updateSummary()">
<option value="">Select Time</option>
<option>1:30 PM</option>
<option>2:00 PM</option>
<option>2:30 PM</option>
<option>3:00 PM</option>
<option>3:30 PM</option>
<option>4:00 PM</option>
<option>4:30 PM</option>
<option>5:00 PM</option>
<option>5:30 PM</option>
<option>6:00 PM</option>
<option>6:30 PM</option>
<option>7:00 PM</option>
<option>7:30 PM</option>
<option>8:00 PM</option>
<option>8:30 PM</option>
<option>9:00 PM</option>
</select>
`;
menuDiv.appendChild(div);
});

function updateSummary(){
let summary="";
let total=0;

menuItems.forEach((item,i)=>{
let qty=parseInt(document.getElementById(`qty${i}`).value)||0;
let date=document.getElementById(`date${i}`).value;
let time=document.getElementById(`time${i}`).value;

if(qty>0){
let price=item.price*qty;
total+=price;
summary+=`• ${item.name} x${qty}\n  Date: ${date} Time: ${time}\n  BDT ${price}\n\n`;
}
});

if(summary==="") summary="No items selected";

document.getElementById('summary').innerText=summary;
document.getElementById('total').innerText=total;
}

function generateOrderID(){
return 'GF' + Date.now().toString().slice(-6);
}

function submitOrder(){
let name=document.getElementById('name').value;
let phone=document.getElementById('phone').value;
let address=document.getElementById('address').value;
let summary=document.getElementById('summary').innerText;
let total=document.getElementById('total').innerText;

if(!name||!phone||!address||summary==="No items selected"){
alert('Please fill all required fields');
return;
}

let orderID=generateOrderID();

let message=`\n🟢 GOFIT MEAL BD ORDER\n\n🆔 Order ID: ${orderID}\n👤 Name: ${name}\n📞 Phone: ${phone}\n📍 Address: ${address}\n\n🍽️ Items:\n${summary}\n💰 Total: BDT ${total}\n\nThank you!`;

let encodedMsg=encodeURIComponent(message);

// Mobile deep link + fallback
let whatsappURL=`https://wa.me/8801830365120?text=${encodedMsg}`;

window.open(whatsappURL,'_blank');
}
</script>

</body>
</html>
